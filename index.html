                content: `

        let currentPage = 0;

        function renderTOC() {
            const toc = document.getElementById('toc');
            content.forEach((page, index) => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = '#';
                a.textContent = page.title;
                a.onclick = (e) => {
                    e.preventDefault();
                    goToPage(index);
                };
                li.appendChild(a);
                toc.appendChild(li);
            });
        }

        function renderPage(index) {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `<div class="page">${content[index].content}</div>`;

            // 为所有pre标签添加复制按钮
            const preElements = mainContent.querySelectorAll('pre');
            preElements.forEach((pre) => {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '复制';
                copyBtn.onclick = () => {
                    const text = pre.textContent.trim();
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.textContent = '已复制';
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.textContent = '复制';
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    }).catch(() => {
                        // 降级方案：使用textarea复制
                        const textarea = document.createElement('textarea');
                        textarea.value = text;
                        textarea.style.position = 'fixed';
                        textarea.style.opacity = '0';
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        copyBtn.textContent = '已复制';
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.textContent = '复制';
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    });
                };
                pre.appendChild(copyBtn);
            });

            document.getElementById('pageNumber').textContent = `${index + 1} / ${content.length}`;
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === content.length - 1;

            const tocLinks = document.querySelectorAll('.toc a');
            tocLinks.forEach((link, i) => {
                link.classList.toggle('active', i === index);
            });

            window.scrollTo(0, 0);
        }

        function goToPage(index) {
            if (index >= 0 && index < content.length) {
                currentPage = index;
                renderPage(currentPage);
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderPage(currentPage);
            }
        }

        function nextPage() {
            if (currentPage < content.length - 1) {
                currentPage++;
                renderPage(currentPage);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                prevPage();
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
                nextPage();
            }
        });

        renderTOC();
        renderPage(0);
    </script>
