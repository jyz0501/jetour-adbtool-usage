                    <p><strong>Q5: 安装后车机变得卡顿怎么办？</strong></p>
                    <p>A: 卸载不必要的第三方软件，清理车机缓存；实在无法解决，恢复出厂设置（谨慎操作）</p>
                    
                    <p><strong>Q6: 如何卸载已安装的软件？</strong></p>
                    <p>A: 车机端打开「应用管家」→ 选择需要卸载的软件 → 点击「卸载」</p>
                    
                    <h3>进阶问题</h3>
                    
                    <p><strong>Q1: 是否会影响车机系统正常运行？是否影响保修</strong></p>
                    <p>A: 不会，需要时可恢复出厂设置，一切重回原点。</p>

                    </div>
                `
            }
        ];

        function renderTOC() {
            const toc = document.getElementById('toc');
            content.forEach((item, index) => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = '#' + item.id;
                a.textContent = item.title;
                a.onclick = (e) => {
                    e.preventDefault();
                    document.getElementById(item.id).scrollIntoView({ behavior: 'smooth' });
                };
                li.appendChild(a);
                toc.appendChild(li);
            });
        }

        function renderContent() {
            const mainContent = document.getElementById('main-content');
            content.forEach(item => {
                const section = document.createElement('div');
                section.className = 'section';
                section.id = item.id;
                section.innerHTML = item.content;
                mainContent.appendChild(section);
            });
        }

        function updateActiveMenu() {
            const sections = content.map(item => document.getElementById(item.id));
            const tocLinks = document.querySelectorAll('.toc a');
            
            let current = '';
            sections.forEach(section => {
                const rect = section.getBoundingClientRect();
                if (rect.top <= 150) {
                    current = section.id;
                }
            });
            
            tocLinks.forEach((link, index) => {
                link.classList.toggle('active', content[index].id === current);
            });
        }

        window.addEventListener('scroll', updateActiveMenu);

        renderTOC();
        renderContent();
    </script>
</body>
</html>
