        function renderTOC() {
            const toc = document.getElementById('toc');
            content.forEach((item, index) => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = '#' + item.id;
                a.textContent = item.title;
                a.onclick = (e) => {
                    e.preventDefault();
                    document.getElementById(item.id).scrollIntoView({ behavior: 'smooth' });
                };
                li.appendChild(a);
                toc.appendChild(li);
            });
        }

        function renderContent() {
            const mainContent = document.getElementById('main-content');
            content.forEach(item => {
                const section = document.createElement('div');
                section.className = 'section';
                section.id = item.id;
                section.innerHTML = item.content;
                mainContent.appendChild(section);
            });
        }

        function updateActiveMenu() {
            const sections = content.map(item => document.getElementById(item.id));
            const tocLinks = document.querySelectorAll('.toc a');
            
            let current = '';
            sections.forEach(section => {
                const rect = section.getBoundingClientRect();
                if (rect.top <= 150) {
                    current = section.id;
                }
            });
            
            tocLinks.forEach((link, index) => {
                link.classList.toggle('active', content[index].id === current);
            });
        }

        function addCopyButtons() {
            const preElements = document.querySelectorAll('.section pre');
            preElements.forEach(pre => {
                if (pre.querySelector('.copy-btn')) return;
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '复制';
                copyBtn.onclick = function() {
                    const clone = pre.cloneNode(true);
                    clone.querySelector('.copy-btn').remove();
                    const text = clone.textContent;
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.textContent = '已复制';
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.textContent = '复制';
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    });
                };
                pre.appendChild(copyBtn);
            });
        }

        window.addEventListener('scroll', updateActiveMenu);

        renderTOC();
        renderContent();
        addCopyButtons();
        
        
    </script>
