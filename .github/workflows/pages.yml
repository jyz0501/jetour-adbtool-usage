name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create deploy directory
        run: |
          mkdir -p deploy
          cp index.html deploy/
          # 生成版本号（基于提交次数）
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="v1.$COMMIT_COUNT.0"
          # 更新版本号（Linux 兼容语法）
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" deploy/index.html
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" index.html
          echo "版本号已更新为: $VERSION"
          cp icon.png deploy/
          cp -r img deploy/
          # 只复制存在的目录
          if [ -d "tools" ]; then
            cp -r tools deploy/
          fi
          if [ -d "apps" ]; then
            cp -r apps deploy/
          fi
          cp README.md deploy/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4