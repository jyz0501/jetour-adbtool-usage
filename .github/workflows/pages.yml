name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create deploy directory
        run: |
          mkdir -p deploy
          cp index.html deploy/
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s/VERSION_PLACEHOLDER/$SHA_SHORT/g" deploy/index.html
          sed -i "s/VERSION_PLACEHOLDER/$SHA_SHORT/g" index.html
          cp icon.png deploy/
          cp -r img deploy/
          cp -r tools deploy/
          cp -r apps deploy/
          cp README.md deploy/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4